version: '3.8'
services:
  db:
    image: postgres:latest
    restart: always
    volumes:
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"

    environment:
        POSTGRES_USER: HMSDB
        POSTGRES_PASSWORD: hospital
        POSTGRES_DB: Hospital-DB

  adminer:
        image: adminer
        restart: always
        ports:
        - "8080:8080"

volumes:
  db_data: